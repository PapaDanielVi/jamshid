version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    dir: ./cmd/jamshid
    binary: jamshid
    ldflags:
      - -X main.Version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - id: jamshid
    package_name: jamshid
    maintainer: "PapaDanielVi <k2527806@gmail.com>"
    description: "Jamshid is a CLI tool for managing multiple Claude Code profiles"
    license: "MIT"
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux

homebrew_casks:
  - name: jamshid

    repository:
      owner: PapaDanielVi
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    url:
      verified: https://github.com/PapaDanielVi/jamshid

    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/jamshid"]
          end

    homepage: "https://github.com/PapaDanielVi/jamshid"
    description: "Jamshid is a CLI tool for managing multiple Claude Code profiles"
    license: "MIT"
